;
; Default GameplayTag table for the GAS Combat Starter plugin.
;
; This ini uses the standard UGameplayTagsSettings [/Script/GameplayTags.GameplayTagsSettings]
; "GameplayTagList" format, which lets tags be shipped with the plugin and picked up
; automatically by any project that enables it (Project Settings > GameplayTags >
; "Import tags from config files" is enabled by default in UE5).
;
; A subset of these tags is also declared natively in C++ for compile-time safety
; (see Source/GASCombatStarter/Public/GCSNativeGameplayTags.h). Native declarations
; and this ini must stay in sync -- if you rename a tag here, update the native
; declaration/definition too (and vice versa).
;
; Tag hierarchy overview:
;   GCS.Ability.*    Identifies what kind of ability something is (melee/projectile/block).
;   GCS.State.*      Transient states applied to actors via GameplayEffects (blocking, staggered, dead, parry window).
;   GCS.Event.*      GameplayEvent tags sent via SendGameplayEventToActor for cross-ability communication.
;   GCS.Effect.*     Asset tags applied to GameplayEffects themselves, for filtering/analytics/cues.
;   GCS.Input.*      Tags used to bind input to ability activation (AbilitySystemComponent::TryActivateAbilitiesByTag).
;   GCS.Cooldown.*   Tags granted for the duration of an ability's cooldown.
;   GCS.SetByCaller.* Tags used as keys for FGameplayEffectSpec::SetSetByCallerMagnitude, letting code inject a runtime magnitude (e.g. base damage/heal) into a GameplayEffect at spec-creation time.

[/Script/GameplayTags.GameplayTagsSettings]
+GameplayTagList=(Tag="GCS.Ability.Melee",Comment="Tag identifying melee attack abilities.")
+GameplayTagList=(Tag="GCS.Ability.Projectile",Comment="Tag identifying projectile attack abilities.")
+GameplayTagList=(Tag="GCS.Ability.Block",Comment="Tag identifying block abilities.")

+GameplayTagList=(Tag="GCS.State.Blocking",Comment="Applied while the actor is actively blocking.")
+GameplayTagList=(Tag="GCS.State.Staggered",Comment="Applied while the actor is staggered/hit-reacting and unable to act normally.")
+GameplayTagList=(Tag="GCS.State.Dead",Comment="Applied when the actor's Health has reached zero.")
+GameplayTagList=(Tag="GCS.State.InParryWindow",Comment="Applied during the brief window in which an incoming attack can be parried.")
+GameplayTagList=(Tag="GCS.State.InDodge",Comment="Applied for the duration of an active dodge/evade maneuver (see UGCSAbility_Dodge).")

+GameplayTagList=(Tag="GCS.HitReact.Front",Comment="Hit-react direction: instigator was primarily in front of the target. See UGCSAbility_HitReact.")
+GameplayTagList=(Tag="GCS.HitReact.Back",Comment="Hit-react direction: instigator was primarily behind the target. See UGCSAbility_HitReact.")
+GameplayTagList=(Tag="GCS.HitReact.Left",Comment="Hit-react direction: instigator was primarily to the target's left. See UGCSAbility_HitReact.")
+GameplayTagList=(Tag="GCS.HitReact.Right",Comment="Hit-react direction: instigator was primarily to the target's right. See UGCSAbility_HitReact.")

+GameplayTagList=(Tag="GCS.Event.HitReact",Comment="GameplayEvent sent to a target when it is hit, to trigger hit-react montages/abilities.")
+GameplayTagList=(Tag="GCS.Event.ParrySuccess",Comment="GameplayEvent sent when a parry window successfully blocks/counters an attack.")
+GameplayTagList=(Tag="GCS.Event.ComboAdvance",Comment="GameplayEvent sent to advance a melee combo to its next stage.")
+GameplayTagList=(Tag="GCS.Event.Death",Comment="GameplayEvent sent when an actor dies.")

+GameplayTagList=(Tag="GCS.Effect.Damage",Comment="Asset tag applied to damage GameplayEffects.")
+GameplayTagList=(Tag="GCS.Effect.Heal",Comment="Asset tag applied to healing GameplayEffects.")
+GameplayTagList=(Tag="GCS.Effect.Stagger",Comment="Asset tag applied to stagger/hit-react GameplayEffects.")

+GameplayTagList=(Tag="GCS.Input.PrimaryAttack",Comment="Input tag bound to the primary attack action (melee or ranged).")
+GameplayTagList=(Tag="GCS.Input.Block",Comment="Input tag bound to the block action.")
+GameplayTagList=(Tag="GCS.Input.Dodge",Comment="Input tag bound to the dodge/evade action.")

+GameplayTagList=(Tag="GCS.Cooldown.Melee",Comment="Cooldown tag for melee attack abilities.")
+GameplayTagList=(Tag="GCS.Cooldown.Projectile",Comment="Cooldown tag for projectile attack abilities.")
+GameplayTagList=(Tag="GCS.Cooldown.Block",Comment="Cooldown tag for block abilities.")

+GameplayTagList=(Tag="GCS.SetByCaller.BaseDamage",Comment="Raw/base damage magnitude passed into GEs via SetByCaller before AttackPower scaling and DefensePower mitigation. See UGCSExecCalc_Damage.")
+GameplayTagList=(Tag="GCS.SetByCaller.BaseHeal",Comment="Raw/base heal magnitude passed into GEs via SetByCaller. See UGCSExecCalc_Heal.")

+GameplayTagList=(Tag="GCS.Effect.CriticalHit",Comment="Applied to the target's tags for one execution when a damage calculation rolls a critical hit. Useful for triggering VFX/SFX/UI gameplay cues. See UGCSExecCalc_Damage.")

; GameplayCue.* tags -- NOTE the "GameplayCue." root is mandatory for these to
; be recognized as cue identifiers by UGameplayCueManager/UAbilitySystemComponent.
+GameplayTagList=(Tag="GameplayCue.GCS.HitImpact",Comment="Burst GameplayCue for melee/ranged hit impact feedback (VFX/SFX/camera shake). See UGCSGameplayCueNotify_HitImpact.")
+GameplayTagList=(Tag="GameplayCue.GCS.CriticalHit",Comment="Burst GameplayCue broadcast alongside GameplayCue.GCS.HitImpact when a hit's RawMagnitude exceeds the critical-hit threshold. See UGCSGameplayCueNotify_HitImpact.")
